<header class="site-header">
  <div class="wrap nav-wrap">
    <a class="brand" href="{{ "/" | relURL }}" aria-label="AdaGo Startseite"><img src="{{ "images/adago-logo-color.png" | relURL }}" alt="AdaGo" width="196" height="62"></a>
    <button class="menu-button" type="button" aria-expanded="false" aria-controls="main-nav"><span class="sr-only">Menü</span><span></span><span></span></button>
    <nav id="main-nav" aria-label="Hauptnavigation">
      {{ range site.Menus.main }}<a href="{{ .URL }}"{{ if $.IsMenuCurrent "main" . }} aria-current="page"{{ end }}>{{ .Name }}</a>{{ end }}
    </nav>
    <button class="theme-button" type="button" aria-label="Farbschema wechseln" title="Farbschema wechseln">◐</button>
  </div>
</header>
